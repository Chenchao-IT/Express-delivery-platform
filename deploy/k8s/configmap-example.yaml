# 文档 6.2：ConfigMap 示例 - 替换敏感信息后使用
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: campus-delivery
data:
  redis.host: "redis-service"
  # 其他非敏感配置可在此添加
---
# 可选：应用专用 ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-config
  namespace: campus-delivery
data:
  # application.yml 片段或环境变量映射
  application.yml: |
    spring:
      datasource:
        url: jdbc:mysql://mysql-service:3306/campus_express
    redis:
      host: ${REDIS_HOST:}
    emergency:
      enabled: true
      db-health:
        check-interval: 5000
        failure-threshold: 3
        recovery-threshold: 10
